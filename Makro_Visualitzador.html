<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Makro - Evolucio de preus</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f5f4f0;
    --card: #ffffff;
    --border: #e2e0d8;
    --text: #1c1c1a;
    --text-sec: #6b6a63;
    --accent: #185fa5;
    --up: #a32d2d;
    --down: #3b6d11;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  .subtitle { color: var(--text-sec); font-size: 13px; margin: 0 0 20px; }
  .layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    max-width: 1500px;
    margin: 0 auto;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .stat-label { font-size: 12px; color: var(--text-sec); }
  .stat-value { font-size: 20px; font-weight: 600; margin-top: 2px; }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  input[type="text"] {
    flex: 1;
    min-width: 200px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: var(--card);
    color: var(--text);
  }
  select {
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: var(--card);
    color: var(--text);
  }
  .content {
    display: grid;
    grid-template-columns: 2.2fr 1fr;
    gap: 16px;
    align-items: start;
  }
  @media (max-width: 800px) {
    .content { grid-template-columns: 1fr; }
  }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    text-align: left;
    padding: 10px 12px;
    background: #eeece5;
    font-weight: 600;
    color: var(--text-sec);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--text); }
  tbody tr {
    border-top: 1px solid var(--border);
    cursor: pointer;
  }
  tbody tr:hover { background: #f2f1eb; }
  tbody tr.active { background: #e6f1fb; }
  td { padding: 9px 12px; }
  .desc-cell { white-space: normal; word-break: break-word; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .up { color: var(--up); font-weight: 600; }
  .down { color: var(--down); font-weight: 600; }
  .flat { color: var(--text-sec); }
  .table-wrap { max-height: 620px; overflow-y: auto; }
  .detail-panel { padding: 16px; position: sticky; top: 16px; }
  .detail-title { font-size: 15px; font-weight: 600; margin: 0 0 2px; }
  .detail-code { font-size: 12px; color: var(--text-sec); margin: 0 0 14px; }
  .chart-box { position: relative; height: 240px; margin-bottom: 14px; }
  .detail-empty { color: var(--text-sec); font-size: 13px; padding: 40px 0; text-align: center; }
  .purchase-list { font-size: 12px; }
  .purchase-list table td { padding: 5px 6px; }
  .purchase-list thead th { padding: 6px; font-size: 10px; }
  .count-badge {
    display: inline-block;
    background: #eeece5;
    color: var(--text-sec);
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 10px;
  }
</style>
</head>
<body>

<h1>Compres a Makro</h1>
<p class="subtitle" id="subtitle">Evolucio de preus per producte</p>

<div class="layout">
  <div class="stats" id="stats"></div>

  <div class="controls">
    <input type="text" id="search" placeholder="Cerca un producte...">
    <select id="filter">

      <option value="changed">Nomes amb canvi de preu</option>
      <option value="multi">Comprats mes d'un cop</option>
    </select>
    <select id="sort">
      <option value="name">Ordena: Nom</option>
      <option value="n_desc">Ordena: Mes comprats</option>
      <option value="change_desc">Ordena: Pujada de preu</option>
      <option value="change_asc">Ordena: Baixada de preu</option>
    </select>
  </div>

  <div class="content">
    <div class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Producte</th>
              <th class="num">Compres</th>
              <th class="num">Preu inicial</th>
              <th class="num">Preu actual</th>
              <th class="num">Variacio</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="panel detail-panel" id="detailPanel">
      <div class="detail-empty">Selecciona un producte de la llista per veure la seva evolucio de preu</div>
    </div>
  </div>
</div>

const products = RAW.map(p => {
  const purchases = p.purchases.map(([d, price]) => {
    const [dd, mm, yyyy] = d.split('/');
    return { date: d, sortKey: yyyy + mm + dd, price };
  }).sort((a, b) => a.sortKey.localeCompare(b.sortKey));
  const first = purchases[0].price;
  const last = purchases[purchases.length - 1].price;
  return {
    code: p.code,
    desc: p.desc,
    n: p.n,
    purchases,
    first, last,
    change: last - first,
    pct: first ? (last - first) / first * 100 : 0
  };
});

let activeCode = null;

function fmtEur(v) {
  return v.toLocaleString('ca-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' EUR';
}

function renderStats() {
  const totalPurchaseEvents = products.reduce((s, p) => s + p.n, 0);
  const changed = products.filter(p => Math.abs(p.change) > 0.001).length;
  const up = products.filter(p => p.change > 0.001).length;
  const down = products.filter(p => p.change < -0.001).length;
  const stats = [
    ['Productes', products.length],
    ['Compres totals', totalPurchaseEvents],
    ['Amb canvi de preu', changed],
    ['Pujades', up],
    ['Baixades', down],
  ];
  document.getElementById('stats').innerHTML = stats.map(([label, val]) =>
    '<div class="stat-card"><div class="stat-label">' + label + '</div><div class="stat-value">' + val + '</div></div>'
  ).join('');
}

function getFiltered() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filter = document.getElementById('filter').value;
  const sort = document.getElementById('sort').value;

  let list = products.filter(p => p.desc.toLowerCase().includes(q));
  if (filter === 'changed') list = list.filter(p => Math.abs(p.change) > 0.001);
  if (filter === 'multi') list = list.filter(p => p.n > 1);

  if (sort === 'name') list.sort((a, b) => a.desc.localeCompare(b.desc));
  if (sort === 'n_desc') list.sort((a, b) => b.n - a.n);
  if (sort === 'change_desc') list.sort((a, b) => b.change - a.change);
  if (sort === 'change_asc') list.sort((a, b) => a.change - b.change);

  return list;
}

function renderTable() {
  const list = getFiltered();
  document.getElementById('subtitle').textContent = list.length + ' de ' + products.length + ' productes';
  const rows = list.map(p => {
    const cls = p.change > 0.001 ? 'up' : (p.change < -0.001 ? 'down' : 'flat');
    const sign = p.change > 0.001 ? '+' : '';
    const changeTxt = Math.abs(p.change) < 0.001 ? '-' : sign + p.change.toFixed(2) + ' (' + sign + p.pct.toFixed(1) + '%)';
    const activeCls = p.code === activeCode ? ' active' : '';
    return '<tr class="' + activeCls + '" data-code="' + p.code + '">' +
      '<td class="desc-cell" title="' + p.desc.replace(/"/g,'&quot;') + '">' + p.desc + '</td>' +
      '<td class="num">' + p.n + '</td>' +
      '<td class="num">' + p.first.toFixed(2) + '</td>' +
      '<td class="num">' + p.last.toFixed(2) + '</td>' +
      '<td class="num ' + cls + '">' + changeTxt + '</td>' +
      '</tr>';
  }).join('');
  document.getElementById('tbody').innerHTML = rows || '<tr><td colspan="5" style="padding:20px;text-align:center;color:var(--text-sec)">Cap producte trobat</td></tr>';

  document.querySelectorAll('#tbody tr[data-code]').forEach(tr => {
    tr.addEventListener('click', () => {
      activeCode = tr.getAttribute('data-code');
      renderTable();
      renderDetail();
    });
  });
}

let chartInstance = null;

function renderDetail() {
  const panel = document.getElementById('detailPanel');
  const p = products.find(x => x.code === activeCode);
  if (!p) {
    panel.innerHTML = '<div class="detail-empty">Selecciona un producte de la llista per veure la seva evolucio de preu</div>';
    return;
  }
  panel.innerHTML =
    '<p class="detail-title">' + p.desc + '</p>' +
    '<p class="detail-code">Codi ' + p.code + ' &middot; <span class="count-badge">' + p.n + ' compres</span></p>' +
    '<div class="chart-box"><canvas id="priceChart"></canvas></div>' +
    '<div class="purchase-list"><table><thead><tr><th>Data</th><th class="num">Preu</th></tr></thead><tbody>' +
    p.purchases.slice().reverse().map(pu => '<tr><td>' + pu.date + '</td><td class="num">' + pu.price.toFixed(2) + ' EUR</td></tr>').join('') +
    '</tbody></table></div>';

  if (chartInstance) { chartInstance.destroy(); }
  const ctx = document.getElementById('priceChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: p.purchases.map(pu => pu.date),
      datasets: [{
        label: 'Preu (EUR)',
        data: p.purchases.map(pu => pu.price),
        borderColor: '#185fa5',
        backgroundColor: 'rgba(24,95,165,0.08)',
        fill: true,
        tension: 0.15,
        pointRadius: 3,
        pointBackgroundColor: '#185fa5',
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { ticks: { callback: v => v.toFixed(2) + ' EUR' } },
        x: { ticks: { maxRotation: 45, minRotation: 45, font: { size: 10 } } }
      }
    }
  });
}

document.getElementById('search').addEventListener('input', renderTable);
document.getElementById('filter').addEventListener('change', renderTable);
document.getElementById('sort').addEventListener('change', renderTable);

renderStats();
renderTable();
</script>

</body>
</html>
